name: Build BeyondBrightness

on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute build label
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "BUILD_LABEL=nightly-$(date -u +%Y%m%d)" >> "$GITHUB_ENV"
          else
            echo "BUILD_LABEL=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Build app bundle
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Package app as DMG
        run: |
          mkdir -p Build/Release
          cp -R Build/BeyondBrightness.app Build/Release/BeyondBrightness.app
          ln -s /Applications Build/Release/Applications
          hdiutil create \
            -volname "BeyondBrightness" \
            -srcfolder Build/Release \
            -ov \
            -format UDZO \
            Build/BeyondBrightness-${BUILD_LABEL}.dmg

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeyondBrightness-${{ env.BUILD_LABEL }}
          path: Build/BeyondBrightness-${{ env.BUILD_LABEL }}.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Build/BeyondBrightness-${{ env.BUILD_LABEL }}.dmg
          generate_release_notes: true
